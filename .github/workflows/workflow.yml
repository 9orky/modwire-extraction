name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/modwire_extraction/extractors/languages/typescript/package-lock.json

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"

      - name: Check TypeScript extractor bundle
        working-directory: src/modwire_extraction/extractors/languages/typescript
        run: |
          npm ci
          npm run check
          npm run build

      - name: Check PHP extractor bundle
        working-directory: src/modwire_extraction/extractors/languages/php
        run: |
          composer install --no-interaction --no-progress --prefer-dist
          composer check
          composer build

      - name: Verify generated TypeScript bundle is committed
        run: git diff --exit-code -- src/modwire_extraction/extractors/languages/typescript/script.js

      - name: Run tests
        run: pytest

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: python -m pip install ".[dev]"

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
